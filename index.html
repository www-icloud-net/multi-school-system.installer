  const { session } = React.useContext(SessionContext);
  if (activeNav === 'communication') return <CommunicationCenter />;
  const ministryIds = data.ministries.filter(m => m.leader_member_id === session.linkedId || m.id === data.members.find(x => x.id === session.linkedId)?.primary_ministry_id).map(m => m.id);
  const memberFilter = row => ministryIds.includes(row.primary_ministry_id) || data.memberMinistries.some(mm => mm.member_id === row.id && ministryIds.includes(mm.ministry_id));
  if (activeNav === 'members') return <MembersManagement title="Ministry Member Records" filterFn={memberFilter} />;
  if (activeNav === 'assignments') return <MinistryEnrollmentManagement />;
  if (activeNav === 'events') return <EventsCenter ministryIds={ministryIds} />;
  if (activeNav === 'volunteers') return <VolunteerSchedulesManagement ministryIds={ministryIds} />;
  if (activeNav === 'announcements') return <AnnouncementsManagement readOnly />;
  if (activeNav === 'notifications') return <NotificationCenter />;
  if (activeNav === 'chat') return <ChatManagement role="ministry_leader" linkedId={session.linkedId} />;
  return <OverviewDashboard title="Ministry Leader Dashboard" />;
}
function MemberProfile({ member }) {
  const { data, updateCollection } = React.useContext(DataContext);
  const [form, setForm] = React.useState(member || {});
  React.useEffect(() => setForm(member || {}), [member?.id]);
  if (!member) return <EmptyState text="No linked member record found." />;
  const save = async e => { e.preventDefault(); await updateCollection('members', rows => rows.map(row => row.id === member.id ? { ...row, ...form } : row)); };
  const myGiving = data.giving.filter(row => row.member_id === member.id);
  const myAttendance = data.attendance.filter(row => row.member_id === member.id);
  const myPrayers = data.careRequests.filter(row => row.member_id === member.id && (row.request_type || 'Prayer') === 'Prayer');
  const myVisits = data.pastoralVisits.filter(row => row.member_id === member.id);
  const myMinistries = data.memberMinistries.filter(row => row.member_id === member.id);
  const myCertificates = data.certificates.filter(row => row.member_id === member.id);
  const myWelfare = data.welfareRecords.filter(row => row.member_id === member.id);
  return <div className="space-y-4">
    <SectionHeader title="My Profile" />
    <div className="grid-fit">
      <StatCard label="Giving Total" value={money(sumBy(myGiving, 'amount'))} icon="hand-holding-dollar" />
      <StatCard label="Attendance" value={myAttendance.length} icon="clipboard-check" accent="blue" />
      <StatCard label="Prayer Requests" value={myPrayers.length} icon="hands-praying" accent="amber" />
      <StatCard label="Certificates" value={myCertificates.length} icon="certificate" accent="purple" />
    </div>
    <div className="card p-5 flex flex-col sm:flex-row sm:items-center gap-4">
      <img src={qrImageUrl(memberQrToken(member), 180)} alt="Member QR" className="w-36 h-36 rounded-xl border bg-white" />
      <div className="min-w-0"><h3 className="font-extrabold text-lg">Member QR Card</h3><div className="text-sm text-slate-500 mt-1">{member.full_name}</div><div className="font-mono text-xs mt-2 cell-wrap">{member.member_number}</div></div>
    </div>
    <form onSubmit={save} className="card p-5 space-y-4">
      <div className="grid md:grid-cols-2 gap-4">
        <Field label="Photo"><ImageUploadInput value={form.photo_url || ''} folder="members" shape="rounded-full" onChange={photo_url => setForm({ ...form, photo_url })} /></Field>
        <Field label="Full Name"><input className="input" value={form.full_name || ''} onChange={e => setForm({ ...form, full_name: e.target.value })} /></Field>
        <Field label="Phone"><input className="input" value={form.phone || ''} onChange={e => setForm({ ...form, phone: e.target.value })} /></Field>
        <Field label="Email"><input className="input" value={form.email || ''} onChange={e => setForm({ ...form, email: e.target.value })} /></Field>
        <Field label="Date of Birth"><input className="input" type="date" value={form.dob || ''} onChange={e => setForm({ ...form, dob: e.target.value })} /></Field>
        <Field label="Marital Status"><select className="select" value={form.marital_status || 'Single'} onChange={e => setForm({ ...form, marital_status: e.target.value })}>{MARITAL_STATUSES.map(x => <option key={x}>{x}</option>)}</select></Field>
        <Field label="Address"><input className="input" value={form.address || ''} onChange={e => setForm({ ...form, address: e.target.value })} /></Field>
        <Field label="Primary Ministry"><input className="input" readOnly value={ministryName(data, form.primary_ministry_id)} /></Field>
        <Field label="Membership Status"><input className="input" readOnly value={form.membership_status || ''} /></Field>
      </div>
      <div className="flex justify-end"><button className="btn btn-primary">Save Profile</button></div>
    </form>
    <div className="grid lg:grid-cols-2 gap-4">
      <div className="card p-5"><h3 className="font-extrabold mb-3">Ministry History</h3><Table columns={[{ key: 'ministry_id', label: 'Ministry', render: r => ministryName(data, r.ministry_id) }, { key: 'role_title', label: 'Role' }, { key: 'joined_at', label: 'Joined' }, { key: 'active', label: 'Status', render: r => r.active ? 'Active' : 'Inactive' }]} rows={myMinistries} /></div>
      <div className="card p-5"><h3 className="font-extrabold mb-3">Prayer and Care History</h3><Table columns={[{ key: 'requested_at', label: 'Date', render: r => r.requested_at ? new Date(r.requested_at).toLocaleDateString() : '' }, { key: 'privacy_level', label: 'Privacy' }, { key: 'status', label: 'Status', render: r => <span className={`pill ${statusClass(r.status)}`}>{r.status}</span> }, { key: 'request_text', label: 'Request' }]} rows={myPrayers} /></div>
      <div className="card p-5"><h3 className="font-extrabold mb-3">Pastoral Visits</h3><Table columns={[{ key: 'visit_date', label: 'Date' }, { key: 'minister_id', label: 'Minister', render: r => ministerName(data, r.minister_id) }, { key: 'visit_type', label: 'Type' }, { key: 'status', label: 'Status' }]} rows={myVisits} /></div>
      <div className="card p-5"><h3 className="font-extrabold mb-3">Certificates and Welfare</h3><Table columns={[{ key: 'kind', label: 'Record' }, { key: 'date', label: 'Date' }, { key: 'detail', label: 'Detail' }, { key: 'status', label: 'Status' }]} rows={[...myCertificates.map(row => ({ id: row.id, kind: row.certificate_type, date: row.certificate_date, detail: row.certificate_number, status: 'Issued' })), ...myWelfare.map(row => ({ id: row.id, kind: row.support_type, date: row.support_date, detail: money(row.amount), status: row.status }))]} /></div>
    </div>
  </div>;
}
function MemberGivingView({ member }) {
  const { data } = React.useContext(DataContext);
  const rows = data.giving.filter(row => row.member_id === member.id);
  return <div className="space-y-4"><SectionHeader title="My Giving" subtitle={`Total: ${money(sumBy(rows, 'amount'))}`} /><Table columns={[{ key: 'giving_date', label: 'Date' }, { key: 'fund_id', label: 'Fund', render: r => fundName(data, r.fund_id) }, { key: 'amount', label: 'Amount', render: r => <span className="font-extrabold text-emerald-700">{money(r.amount)}</span> }, { key: 'payment_method', label: 'Method' }, { key: 'reference', label: 'Reference' }]} rows={rows} /></div>;
}
function MemberPledgesView({ member }) {
  const { data, updateCollection, notify } = React.useContext(DataContext);
  const [open, setOpen] = React.useState(false);
  const [form, setForm] = React.useState({ fund_id: data.funds[0]?.id || '', pledge_amount: '', due_date: '', notes: '' });
  const rows = data.pledges.filter(row => row.member_id === member.id);
  const save = async e => {
    e.preventDefault();
    if (!form.fund_id || Number(form.pledge_amount || 0) <= 0) { notify('error', 'Select a fund and enter a pledge amount.'); return; }
    const payload = { id: uid(), member_id: member.id, fund_id: form.fund_id, pledge_date: today(), pledge_amount: Number(form.pledge_amount || 0), amount_received: 0, due_date: form.due_date || '', status: 'Open', notes: form.notes || '' };
    await updateCollection('pledges', items => [payload, ...safeArray(items)], { successMessage: 'Pledge submitted successfully.' });
    setForm({ fund_id: data.funds[0]?.id || '', pledge_amount: '', due_date: '', notes: '' });
    setOpen(false);
  };
  return <div className="space-y-4"><SectionHeader title="My Pledges" actions={<button className="btn btn-primary" onClick={() => setOpen(true)}><i className="fas fa-plus"></i>New Pledge</button>} /><Table columns={[{ key: 'fund_id', label: 'Fund', render: r => fundName(data, r.fund_id) }, { key: 'pledge_date', label: 'Pledge Date' }, { key: 'pledge_amount', label: 'Pledged', render: r => money(r.pledge_amount) }, { key: 'amount_received', label: 'Received', render: r => money(r.amount_received) }, { key: 'balance', label: 'Balance', render: r => money(Math.max(Number(r.pledge_amount || 0) - Number(r.amount_received || 0), 0)) }, { key: 'status', label: 'Status', render: r => <span className={`pill ${statusClass(r.status)}`}>{r.status}</span> }]} rows={rows} /><Modal open={open} title="New Pledge" onClose={() => setOpen(false)}><form onSubmit={save} className="space-y-4"><div className="grid md:grid-cols-2 gap-4"><Field label="Fund"><select className="select" value={form.fund_id} onChange={e => setForm({ ...form, fund_id: e.target.value })}>{data.funds.filter(row => row.active !== false).map(row => <option key={row.id} value={row.id}>{row.name}</option>)}</select></Field><Field label="Amount"><input className="input" type="number" min="0" step="0.01" value={form.pledge_amount} onChange={e => setForm({ ...form, pledge_amount: e.target.value })} /></Field><Field label="Due Date"><input className="input" type="date" value={form.due_date} onChange={e => setForm({ ...form, due_date: e.target.value })} /></Field><Field label="Notes"><textarea className="textarea" value={form.notes} onChange={e => setForm({ ...form, notes: e.target.value })}></textarea></Field></div><div className="flex justify-end gap-2"><button type="button" className="btn btn-secondary" onClick={() => setOpen(false)}>Cancel</button><button className="btn btn-primary">Save Pledge</button></div></form></Modal></div>;
}
function MemberAttendanceView({ member }) {
  const { data } = React.useContext(DataContext);
  const rows = data.attendance.filter(row => row.member_id === member.id);
  return <div className="space-y-4"><SectionHeader title="My Attendance" /><Table columns={[{ key: 'service_id', label: 'Service', render: r => serviceLabel(data, r.service_id) }, { key: 'status', label: 'Status', render: r => <span className={`pill ${statusClass(r.status)}`}>{r.status}</span> }, { key: 'checked_in_at', label: 'Checked In', render: r => r.checked_in_at ? new Date(r.checked_in_at).toLocaleString() : '' }, { key: 'notes', label: 'Notes' }]} rows={rows} /></div>;
}
function MemberCareView({ member }) {
  const { data, updateCollection, notify } = React.useContext(DataContext);
  const [open, setOpen] = React.useState(false);
  const [form, setForm] = React.useState({ privacy_level: 'Prayer Team', priority: 'Normal', request_text: '' });
  const rows = data.careRequests.filter(row => row.member_id === member.id && (row.request_type || 'Prayer') === 'Prayer');
  const save = async e => {
    e.preventDefault();
    if (!form.request_text.trim()) { notify('error', 'Prayer request is required.'); return; }
    const payload = { id: uid(), member_id: member.id, requester_name: member.full_name, request_type: 'Prayer', privacy_level: form.privacy_level, priority: form.priority, status: 'Open', assigned_minister_id: '', request_text: form.request_text.trim(), private_notes: '', requested_at: nowIso(), prayed_at: '', answered_at: '', closed_at: '' };
    await updateCollection('careRequests', items => [payload, ...safeArray(items)], { successMessage: 'Prayer request submitted successfully.' });
    setForm({ privacy_level: 'Prayer Team', priority: 'Normal', request_text: '' });
    setOpen(false);
  };
  return <div className="space-y-4"><SectionHeader title="Prayer Requests" actions={<button className="btn btn-primary" onClick={() => setOpen(true)}><i className="fas fa-plus"></i>Submit Prayer Request</button>} /><Table columns={[{ key: 'privacy_level', label: 'Privacy', render: r => r.privacy_level || 'Prayer Team' }, { key: 'priority', label: 'Priority', render: r => <span className={`pill ${statusClass(r.priority)}`}>{r.priority}</span> }, { key: 'status', label: 'Status', render: r => <span className={`pill ${statusClass(r.status)}`}>{r.status}</span> }, { key: 'assigned_minister_id', label: 'Assigned Minister', render: r => ministerName(data, r.assigned_minister_id) }, { key: 'request_text', label: 'Request' }]} rows={rows} /><Modal open={open} title="Submit Prayer Request" onClose={() => setOpen(false)}><form onSubmit={save} className="space-y-4"><div className="grid md:grid-cols-2 gap-4"><Field label="Privacy"><select className="select" value={form.privacy_level} onChange={e => setForm({ ...form, privacy_level: e.target.value })}>{PRAYER_PRIVACY_OPTIONS.map(x => <option key={x}>{x}</option>)}</select></Field><Field label="Priority"><select className="select" value={form.priority} onChange={e => setForm({ ...form, priority: e.target.value })}>{PRIORITIES.map(x => <option key={x}>{x}</option>)}</select></Field></div><Field label="Request"><textarea className="textarea" value={form.request_text} onChange={e => setForm({ ...form, request_text: e.target.value })}></textarea></Field><div className="flex justify-end gap-2"><button type="button" className="btn btn-secondary" onClick={() => setOpen(false)}>Cancel</button><button className="btn btn-primary">Submit</button></div></form></Modal></div>;
}
function MemberEventsView({ member }) {
  const { data, updateCollection } = React.useContext(DataContext);
  const register = async event => {
    const existing = data.eventRegistrations.find(row => row.event_id === event.id && row.member_id === member.id);
    if (existing) {
      await updateCollection('eventRegistrations', rows => rows.map(row => row.id === existing.id ? { ...row, registration_status: 'Registered', registered_at: row.registered_at || nowIso() } : row), { successMessage: 'Event registration updated successfully.' });
      return;
    }
    const payload = { id: uid(), event_id: event.id, member_id: member.id, visitor_name: '', registration_status: 'Registered', registered_at: nowIso(), notes: '' };
    await updateCollection('eventRegistrations', rows => [payload, ...safeArray(rows)], { successMessage: 'Event registration saved successfully.' });
  };
  const cancel = async event => {
    const existing = data.eventRegistrations.find(row => row.event_id === event.id && row.member_id === member.id);
    if (!existing) return;
    await updateCollection('eventRegistrations', rows => rows.map(row => row.id === existing.id ? { ...row, registration_status: 'Cancelled' } : row), { successMessage: 'Event registration cancelled.' });
  };
  const rows = data.events.map(event => {
    const registration = data.eventRegistrations.find(row => row.event_id === event.id && row.member_id === member.id);
    return { ...event, registered: !!registration && registration.registration_status !== 'Cancelled', registration_status: registration?.registration_status || '' };
  });
  return <div className="space-y-4"><SectionHeader title="Events" /><Table columns={[{ key: 'title', label: 'Event' }, { key: 'ministry_id', label: 'Ministry', render: r => ministryName(data, r.ministry_id) }, { key: 'event_date', label: 'Date' }, { key: 'venue', label: 'Venue' }, { key: 'status', label: 'Status', render: r => <span className={`pill ${statusClass(r.status)}`}>{r.status}</span> }, { key: 'registered', label: 'Registration', render: r => r.registered ? <div className="flex gap-2"><span className="pill active">Registered</span><button className="btn btn-outline !py-1.5" onClick={() => cancel(r)}>Cancel</button></div> : <button className="btn btn-outline !py-1.5" onClick={() => register(r)}>Register</button> }]} rows={rows} /></div>;
}
function MemberDashboard({ activeNav }) {
  const { data } = React.useContext(DataContext);
  const { session } = React.useContext(SessionContext);
  const member = data.members.find(x => x.id === session.linkedId);
  if (!member) return <EmptyState text="No linked member record found." />;
  if (activeNav === 'profile') return <MemberProfile member={member} />;
  if (activeNav === 'giving') return <MemberGivingView member={member} />;
  if (activeNav === 'pledges') return <MemberPledgesView member={member} />;
  if (activeNav === 'attendance') return <MemberAttendanceView member={member} />;
  if (activeNav === 'care') return <MemberCareView member={member} />;
  if (activeNav === 'events') return <MemberEventsView member={member} />;
  if (activeNav === 'announcements') return <AnnouncementsManagement readOnly />;
  if (activeNav === 'notifications') return <NotificationCenter />;
  if (activeNav === 'chat') return <ChatManagement role="member" linkedId={member.id} />;
  const myGiving = data.giving.filter(g => g.member_id === member.id);
  const myAttendance = data.attendance.filter(a => a.member_id === member.id);
  return <div className="space-y-5"><SectionHeader title={`Welcome, ${member.full_name}`} subtitle={`${member.member_number || ''} | ${member.membership_status}`} /><div className="grid-fit"><StatCard label="My Giving" value={money(sumBy(myGiving, 'amount'))} icon="hand-holding-dollar" /><StatCard label="Attendance Records" value={myAttendance.length} icon="clipboard-check" accent="blue" /><StatCard label="Open Prayer Requests" value={data.careRequests.filter(c => c.member_id === member.id && (c.request_type || 'Prayer') === 'Prayer' && c.status !== 'Closed').length} icon="hands-praying" accent="amber" /><StatCard label="My Ministry" value={ministryName(data, member.primary_ministry_id)} icon="people-group" accent="purple" /></div><MemberProfile member={member} /></div>;
}
function AppFooter() {
  const { data } = React.useContext(DataContext);
  const verse = ensureDailyVerseSettings(data.churchSettings).verse_of_day;
  return <footer className="system-footer no-print px-4 md:px-6 py-4 text-sm"><div className="flex flex-col md:flex-row md:items-center md:justify-between gap-2"><div className="font-bold" style={{ color: 'var(--theme-footer-accent)' }}>{data.churchSettings.church_name}</div><div className="opacity-80">{[data.churchSettings.address, data.churchSettings.contact, data.churchSettings.location].filter(Boolean).join(' | ')}</div><div className="opacity-90 max-w-xl">{verse}</div></div></footer>;
}
function App() {
  return <DataProvider><AppShell /></DataProvider>;
}


if (['http:', 'https:'].includes(window.location.protocol)) {
  setOrCreateHeadTag('link', 'link[rel="manifest"]', { id: 'app-manifest', rel: 'manifest', href: 'manifest.webmanifest' });
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    });
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
