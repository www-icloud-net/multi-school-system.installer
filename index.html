  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error('Failed to load image.'));
    img.src = src;
  });
}
async function buildZoomedImageFile(sourceDataUrl='', { zoom=1, offsetX=0, offsetY=0, outputWidth=1600, outputHeight=900, filename='edited-image.png' } = {}) {
  const img = await loadImageElement(sourceDataUrl);
  const canvas = document.createElement('canvas');
  canvas.width = outputWidth;
  canvas.height = outputHeight;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, outputWidth, outputHeight);
  const baseScale = Math.max(outputWidth / img.width, outputHeight / img.height);
  const finalScale = baseScale * Math.max(0.3, Number(zoom || 1));
  const drawWidth = img.width * finalScale;
  const drawHeight = img.height * finalScale;
  const drawX = ((outputWidth - drawWidth) / 2) + Number(offsetX || 0);
  const drawY = ((outputHeight - drawHeight) / 2) + Number(offsetY || 0);
  ctx.drawImage(img, drawX, drawY, drawWidth, drawHeight);
  const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png', 0.95));
  if (!blob) throw new Error('Failed to prepare image.');
  return new File([blob], filename, { type: 'image/png' });
}

      setOfflineState(state => ({ ...state, mode: supabaseClient ? 'online' : 'offline', lastSyncAt: supabaseClient ? nowIso() : state.lastSyncAt, lastError: '' }));
      if (!options.silentSuccess) notify('success', options.successMessage || 'Record saved successfully.');
    } catch (error) {
      const pending = options.skipPending ? await loadPendingChanges() : await appendPendingCollectionChange(key, prevItems, nextItems);
      setOfflineState(state => ({ ...state, mode: 'offline', pendingCount: pending.length, lastError: error?.message || 'Sync failed.' }));
      if (!options.silentFailure) notify('info', options.offlineMessage || 'Saved locally. Sync is pending.');
    } finally {
      if (!options.skipAudit && !['presenceRows', 'auditLogs'].includes(key)) {
        const audit = summarizeCollectionChange(key, prevItems, nextItems);
        if (audit.action !== 'view') {
          const session = currentSessionSnapshot();
          const payload = {
            id: uid(),
            action: audit.action,
            area: COLLECTION_LABELS[key] || key,
            record_table: TABLES[key] || key,
            record_id: audit.record_id || '',
            record_label: audit.record_label || '',
            actor_role: session.role || activeSessionRole || null,
            actor_username: session.username || '',
            actor_linked_entity_id: session.linkedId || null,
            actor_name: actorDisplayName(nextData, session),
            details: audit.details,
            created_at: nowIso()
          };
          setData(prev => {
            const mergedRows = [payload, ...safeArray(prev.auditLogs)].slice(0, 1000);
            const mergedData = normalizeData({ ...prev, auditLogs: mergedRows });
            persistOffline(mergedData).catch(() => {});
            return mergedData;
          });
          try { if (supabaseClient && hasActiveSessionToken() && canSyncCollectionKey('auditLogs')) await upsertRowsInChunks(TABLES.auditLogs, [payload], { onConflict: 'id' }); } catch (_) {}
        }
      }
      setBusyText('');
    }
  }, [data, notify]);

  const setChurchSettings = React.useCallback(async updater => {
    const nextSettings = ensureDailyVerseSettings(typeof updater === 'function' ? updater(data.churchSettings) : updater);
    const nextData = normalizeData({ ...data, churchSettings: { ...data.churchSettings, ...nextSettings, id: 1 } });
    setData(nextData);
    await persistOffline(nextData);
    setBusyText('Saving church settings...');
    try {
      if (typeof navigator !== 'undefined' && navigator.onLine === false) throw new Error('Internet connection lost. Using offline mode.');
      await syncSettings(nextData.churchSettings);
      setOfflineState(state => ({ ...state, mode: supabaseClient ? 'online' : 'offline', lastSyncAt: supabaseClient ? nowIso() : state.lastSyncAt, lastError: '' }));
      notify('success', 'Church settings saved successfully.');
    } catch (error) {
      const pending = await appendPendingSettingsChange(nextData.churchSettings);
      setOfflineState(state => ({ ...state, mode: 'offline', pendingCount: pending.length, lastError: error?.message || 'Sync failed.' }));
      notify('info', 'Settings saved locally. Sync is pending.');
    } finally {
      setBusyText('');
    }
  }, [data, notify]);

  const flushPendingChanges = React.useCallback(async () => {
    if (syncInProgressRef.current) return;
    if (typeof navigator !== 'undefined' && navigator.onLine === false) {
      setOfflineState(state => ({ ...state, mode: 'offline', lastError: 'Internet connection lost. Using offline mode.' }));
      return;
    }
    syncInProgressRef.current = true;
    setBusyText('Syncing pending church records...');
    try {
      const pending = await loadPendingChanges();
      const remaining = [];
      for (const change of pending) {
        if (change.kind === 'settings') {
          if (!canSyncChurchSettings()) {
            remaining.push(change);
            continue;
          }
          await syncSettings(change.settings);
          continue;
        }
        if (change.kind === 'collection') {
          if (!canSyncCollectionKey(change.key)) {
            remaining.push(change);
            continue;
          }
          await applySyncDelta(change.table || TABLES[change.key], change.delta || {});
        }
      }
      await savePendingChanges(remaining);
      if (!remaining.length) await syncAll(data);
      setOfflineState(state => ({ ...state, mode: supabaseClient ? 'online' : 'offline', pendingCount: remaining.length, lastSyncAt: supabaseClient ? nowIso() : state.lastSyncAt, lastError: remaining.length ? 'Some pending changes need a permitted account to sync.' : '' }));
      notify(remaining.length ? 'info' : 'success', remaining.length ? 'Some changes are still pending for an authorized account.' : 'Pending records synced successfully.');
    } catch (error) {
      const pending = await loadPendingChanges();
      setOfflineState(state => ({ ...state, mode: 'offline', pendingCount: pending.length, lastError: error?.message || 'Sync failed.' }));
      notify('error', error?.message || 'Sync failed.');
    } finally {
      setBusyText('');
      syncInProgressRef.current = false;
    }
  }, [data, notify, reloadData]);
  React.useEffect(() => { flushPendingRef.current = flushPendingChanges; }, [flushPendingChanges]);
  React.useEffect(() => {
    const handleOnline = () => {
      setOfflineState(state => ({ ...state, mode: supabaseClient ? 'online' : 'offline', lastError: '' }));
      window.setTimeout(() => flushPendingRef.current?.(), 1200);
    };
    const handleOffline = () => setOfflineState(state => ({ ...state, mode: 'offline', lastError: 'Internet connection lost. Using offline mode.' }));
    window.addEventListener('online', handleOnline);
    window.addEventListener('offline', handleOffline);
    const timer = window.setInterval(() => {
      const state = offlineStateRef.current;
      if (state.pendingCount && typeof navigator !== 'undefined' && navigator.onLine !== false) flushPendingRef.current?.();
    }, 30000);
    return () => {
      window.removeEventListener('online', handleOnline);
      window.removeEventListener('offline', handleOffline);
      window.clearInterval(timer);
    };
  }, []);

  const setPresenceStatus = React.useCallback(async (role, linkedId, isOnline) => {
    if (!role) return;
    const entityId = presenceEntityId(linkedId);
    const payload = { role, linked_entity_id: entityId, is_online: !!isOnline, last_seen: nowIso() };
    setData(prev => {
      const rows = normalizePresenceRows(prev.presenceRows);
      const idx = rows.findIndex(row => row.role === role && presenceEntityId(row.linked_entity_id) === entityId);
      const nextRows = idx >= 0 ? rows.map((row, i) => i === idx ? { ...row, ...payload } : row) : [payload, ...rows];
      const nextData = normalizeData({ ...prev, presenceRows: nextRows });
      persistOffline(nextData).catch(() => {});
      return nextData;
    });
    try {
      await savePresenceStatusRemote(role, entityId, isOnline);
      setOfflineState(state => ({ ...state, mode: supabaseClient ? 'online' : state.mode, lastSyncAt: supabaseClient ? nowIso() : state.lastSyncAt, lastError: '' }));
    } catch (error) {
      setOfflineState(state => ({ ...state, lastError: state.lastError || '' }));
    }
  }, []);

  const logActivity = React.useCallback(async (entry={}) => {
    const session = currentSessionSnapshot();
    const payload = {
      id: entry.id || uid(),
      action: entry.action || 'update',
      area: entry.area || entry.collection_key || '',
      record_table: entry.record_table || '',
      record_id: entry.record_id || '',
      record_label: entry.record_label || '',
      actor_role: session.role || activeSessionRole || null,
      actor_username: session.username || '',
      actor_linked_entity_id: session.linkedId || null,
      actor_name: actorDisplayName(data, session),
      details: entry.details || {},
      created_at: entry.created_at || nowIso()
    };
    setData(prev => {
      const nextData = normalizeData({ ...prev, auditLogs: [payload, ...safeArray(prev.auditLogs)].slice(0, 1000) });
      persistOffline(nextData).catch(() => {});
      return nextData;
    });
    try {
      if (supabaseClient && hasActiveSessionToken() && canSyncCollectionKey('auditLogs')) await upsertRowsInChunks(TABLES.auditLogs, [payload], { onConflict: 'id' });
    } catch (_) {}
  }, [data]);

  const clearActivityLogs = React.useCallback(async () => {
    const session = currentSessionSnapshot();
    if ((session.role || activeSessionRole) !== 'superadmin') {
      notify('error', 'Only the Super Admin can clear the activity log.');
      return false;
    }
    const previousLogs = safeArray(data.auditLogs);
    setBusyText('Clearing activity log...');
    try {
      if (!supabaseClient || !hasActiveSessionToken()) throw new Error('Supabase session is not available.');
      if (typeof navigator !== 'undefined' && navigator.onLine === false) throw new Error('Internet connection lost. Please reconnect before clearing the activity log.');
      const ids = previousLogs.map(row => row.id).filter(Boolean);
      if (ids.length) await deleteRowsInChunks(TABLES.auditLogs, ids);
      const nextData = normalizeData({ ...data, auditLogs: [] });
      setData(nextData);
      await persistOffline(nextData);
      const pending = await loadPendingChanges();
      setOfflineState(state => ({ ...state, mode: 'online', pendingCount: pending.length, lastSyncAt: nowIso(), lastError: '' }));
      notify('success', 'Activity log cleared successfully.');
      return true;
    } catch (error) {
      const restoredData = normalizeData({ ...data, auditLogs: previousLogs });
      setData(restoredData);
      await persistOffline(restoredData);
      setOfflineState(state => ({ ...state, lastError: error?.message || 'Activity log clear failed.' }));
      notify('error', error?.message || 'Activity log clear failed.');
      return false;
    } finally {
      setBusyText('');
    }
  }, [data, notify]);

  const createBackupRecord = React.useCallback(async ({ backupName='', selectedKeys=RESTORE_COLLECTION_KEYS, backupType='manual', download=true } = {}) => {
    const session = currentSessionSnapshot();
    const selected = safeArray(selectedKeys).filter(key => BACKUP_COLLECTION_KEYS.includes(key));
    const payload = buildBackupPayload(data, selected, session);
    const name = String(backupName || `${data.churchSettings.church_name || 'church'} backup ${new Date().toLocaleString()}`).trim();
    const record = {
      id: uid(),
      backup_name: name,
      backup_type: backupType,
      collection_keys: selected,
      record_counts: payload.record_counts,
      backup_json: payload,
      created_by_role: session.role || activeSessionRole || null,
      created_by_username: session.username || '',
      created_at: nowIso(),
      restored_at: '',
      restore_count: 0,
      notes: ''
    };
    await updateCollection('backupRecords', rows => [record, ...safeArray(rows)].slice(0, 80), { successMessage: 'Backup saved successfully.', silentFailure: true });
    await logActivity({ action: 'backup_create', area: 'Backup Center', record_table: TABLES.backupRecords, record_id: record.id, record_label: name, details: { collection_keys: selected, record_counts: payload.record_counts } });
    if (download) downloadJson(`${cleanPathName(name)}-${today()}.json`, payload);
    return payload;
  }, [data, updateCollection, logActivity]);

  const restoreFromBackup = React.useCallback(async (payload={}, options={}) => {
    const normalized = normalizeBackupPayload(payload);
    const selected = safeArray(options.selectedKeys || normalized.collection_keys).filter(key => RESTORE_COLLECTION_KEYS.includes(key) && normalized.collections?.[key]);
    if (!selected.length && !options.restoreSettings) throw new Error('No restorable records were found in this backup.');
    const restoreSettings = options.restoreSettings === true && normalized.churchSettings;
    const prevData = data;
    const nextRaw = { ...prevData };
    if (restoreSettings) nextRaw.churchSettings = ensureDailyVerseSettings({ ...defaultChurch, ...normalized.churchSettings, id: 1 });
    selected.forEach(key => { nextRaw[key] = safeArray(normalized.collections[key]); });
    const nextData = normalizeData(nextRaw);
    setBusyText('Restoring church records...');
    setData(nextData);
    await persistOffline(nextData);
    try {
      if (typeof navigator !== 'undefined' && navigator.onLine === false) throw new Error('Internet connection lost. Using offline mode.');
      if (restoreSettings) await syncSettings(nextData.churchSettings);
      for (const key of selected) {
        if (!canSyncCollectionKey(key)) continue;
        await syncSimpleTable(TABLES[key], safeArray(prevData[key]), safeArray(nextData[key]));
      }
      setOfflineState(state => ({ ...state, mode: supabaseClient ? 'online' : 'offline', lastSyncAt: supabaseClient ? nowIso() : state.lastSyncAt, lastError: '' }));
      notify('success', 'Backup restored successfully.');
    } catch (error) {
      let pending = await loadPendingChanges();
      if (restoreSettings) pending = await appendPendingSettingsChange(nextData.churchSettings);
      for (const key of selected) pending = await appendPendingCollectionChange(key, safeArray(prevData[key]), safeArray(nextData[key]));
      setOfflineState(state => ({ ...state, mode: 'offline', pendingCount: pending.length, lastError: error?.message || 'Restore sync is pending.' }));
      notify('info', 'Backup restored locally. Sync is pending.');
    } finally {
      setBusyText('');
    }
    await logActivity({ action: 'backup_restore', area: 'Backup Center', record_label: normalized.church_name || 'System backup', details: { collection_keys: selected, restore_settings: !!restoreSettings } });
    return true;
  }, [data, notify, logActivity]);

  const value = { data, loaded, updateCollection, setChurchSettings, reloadData, notify, notifications, dismissNotification, busyText, offlineState, flushPendingChanges, setPresenceStatus, logActivity, clearActivityLogs, createBackupRecord, restoreFromBackup };
  return <DataContext.Provider value={value}>{children}</DataContext.Provider>;
}

function Table({ columns=[], rows=[], renderActions=null, pageSize=DEFAULT_TABLE_PAGE_SIZE, searchKeys=null, searchPlaceholder='Search records...', exportFilename='church-records.csv', title='Church Records', getSearchText=null }) {
  const [search, setSearch] = React.useState('');
  const [page, setPage] = React.useState(1);
  const deferredSearch = React.useDeferredValue ? React.useDeferredValue(search) : search;
  const effectivePageSize = Math.max(1, Math.min(MAX_TABLE_PAGE_SIZE, Number(pageSize || DEFAULT_TABLE_PAGE_SIZE)));
  const indexedRows = React.useMemo(() => safeArray(rows).map((row, index) => {
    const extraText = getSearchText ? getSearchText(row) : '';
    return { row, index, searchText: `${rowSearchText(row, columns, searchKeys)} ${compactText(extraText)}`.toLowerCase() };
  }), [rows, columns, searchKeys, getSearchText]);
  const visibleItems = React.useMemo(() => {
    const term = String(deferredSearch || '').trim().toLowerCase();
    return term ? indexedRows.filter(item => item.searchText.includes(term)) : indexedRows;
  }, [indexedRows, deferredSearch]);
  const visibleRows = React.useMemo(() => visibleItems.map(item => item.row), [visibleItems]);
  const pageCount = Math.max(1, Math.ceil(visibleItems.length / effectivePageSize));
  React.useEffect(() => { if (page > pageCount) setPage(pageCount); }, [page, pageCount]);
  const pageRows = visibleItems.slice((page - 1) * effectivePageSize, page * effectivePageSize);
  const displayStart = visibleItems.length ? ((page - 1) * effectivePageSize) + 1 : 0;
  const displayEnd = Math.min(page * effectivePageSize, visibleItems.length);
  const cols = renderActions ? [...columns, { key: '__actions', label: 'Actions', render: renderActions }] : columns;
  return <div className="record-table-shell space-y-3">
    <div className="table-tools flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2">
      <input className="input sm:max-w-xs" placeholder={searchPlaceholder} value={search} onChange={e => { setSearch(e.target.value); setPage(1); }} />
      <div className="flex flex-wrap items-center gap-2"><button type="button" className="btn btn-outline !py-2" onClick={() => exportRowsToCsv(exportFilename, columns, visibleRows)} disabled={!visibleRows.length}><i className="fas fa-file-csv"></i>CSV</button><button type="button" className="btn btn-outline !py-2" onClick={() => printRows(title, columns, visibleRows)} disabled={!visibleRows.length}><i className="fas fa-print"></i>Print</button><div className="text-sm font-semibold text-slate-500 whitespace-nowrap">{displayStart}-{displayEnd} of {visibleItems.length} record(s)</div></div>
    </div>
    <div className="table-wrap record-table-wrap rounded-xl border bg-white">
      <table className="record-table min-w-full text-sm">
        <thead className="bg-slate-50 text-slate-600">
          <tr>{cols.map(col => <th key={col.key || col} className="text-left px-4 py-3 font-extrabold">{col.label || col}</th>)}</tr>
        </thead>
        <tbody>
          {pageRows.length ? pageRows.map(({ row, index }) => <tr key={stableRowKey(row, index)} className="border-t hover:bg-slate-50">
            {cols.map(col => {
              const key = col.key || col;
              const val = col.render ? col.render(row) : row[key];
              return <td key={key} data-label={col.label || key} className="px-4 py-3 align-top">{React.isValidElement(val) ? val : <span className="cell-wrap">{val ?? ''}</span>}</td>;
            })}
          </tr>) : <tr><td className="px-4 py-8 text-center text-slate-500" colSpan={cols.length}>No matching records.</td></tr>}
        </tbody>
      </table>
    </div>
    <div className="table-pagination flex justify-end gap-2">
      <button className="btn btn-outline" disabled={page <= 1} onClick={() => setPage(p => Math.max(1, p - 1))}>Prev</button>
      <span className="btn btn-secondary">{page} / {pageCount}</span>
      <button className="btn btn-outline" disabled={page >= pageCount} onClick={() => setPage(p => Math.min(pageCount, p + 1))}>Next</button>
    </div>
  </div>;
}
function renderFormControl(field, form, setForm, data) {
  const value = form[field.name] ?? '';
  const update = next => setForm({ ...form, [field.name]: next });
  if (field.type === 'select') {
    const options = typeof field.options === 'function' ? field.options(data, form) : field.options || [];
    return <select className="select" required={field.required} value={value || ''} onChange={e => update(e.target.value)}>
      <option value="">{field.placeholder || 'Select'}</option>
      {options.map(opt => typeof opt === 'string' ? <option key={opt} value={opt}>{opt}</option> : <option key={opt.value} value={opt.value}>{opt.label}</option>)}
    </select>;
  }
  if (field.type === 'textarea') return <textarea className="textarea" rows={field.rows || 3} required={field.required} value={value || ''} onChange={e => update(e.target.value)} />;
  if (field.type === 'checkbox') return <label className="inline-flex items-center gap-2 font-semibold"><input type="checkbox" checked={!!value} onChange={e => update(e.target.checked)} /> {field.checkboxLabel || 'Enabled'}</label>;
  if (field.type === 'image') return <ImageUploadInput value={value || ''} folder={field.folder || field.name || 'general'} shape={field.shape || 'rounded-xl'} onChange={update} />;
  if (field.type === 'file') return <FileUploadInput value={value || ''} folder={field.folder || field.name || 'documents'} onChange={update} />;
  return <input className="input" type={field.type || 'text'} min={field.min} step={field.step} required={field.required} value={value || ''} onChange={e => update(field.type === 'number' ? e.target.value : e.target.value)} />;
}
function CrudManager({ title, subtitle='', collectionKey, columns, fields, emptyRecord, preparePayload, filterRows, initialPatch={}, searchKeys=null, searchText=null, pageSize=DEFAULT_TABLE_PAGE_SIZE }) {
  const { data, updateCollection, notify } = React.useContext(DataContext);
  const [open, setOpen] = React.useState(false);
  const [form, setForm] = React.useState({ ...emptyRecord, ...initialPatch });
  const rows = React.useMemo(() => {
    const list = safeArray(data[collectionKey]);
    return filterRows ? list.filter(row => filterRows(row, data)) : list;
  }, [data, collectionKey, filterRows]);
  const startAdd = () => { setForm({ ...emptyRecord, ...initialPatch }); setOpen(true); };
  const edit = row => { setForm({ ...emptyRecord, ...row }); setOpen(true); };
  const remove = async row => {
    if (!window.confirm(`Delete ${title.toLowerCase()} record?`)) return;
    await updateCollection(collectionKey, items => safeArray(items).filter(item => item.id !== row.id), { successMessage: 'Record deleted successfully.' });
  };
  const save = async event => {
    event.preventDefault();
    try {
      const base = { ...form, id: form.id || uid(), updated_at: nowIso() };
      if (!form.id) base.created_at = nowIso();
      const payload = preparePayload ? await preparePayload(base, data) : base;
      await updateCollection(collectionKey, items => safeArray(items).some(item => item.id === payload.id) ? safeArray(items).map(item => item.id === payload.id ? payload : item) : [payload, ...safeArray(items)]);
      setOpen(false);
      setForm({ ...emptyRecord, ...initialPatch });
    } catch (error) {
      notify('error', error?.message || 'Unable to save record.');
    }
  };
  return <div className="space-y-4">
    <SectionHeader title={title} subtitle={subtitle} actions={<button className="btn btn-primary" onClick={startAdd}><i className="fas fa-plus"></i>Add</button>} />
    <Table
      columns={columns}
      rows={rows}
      pageSize={pageSize}
      searchKeys={searchKeys}
      title={title}
      exportFilename={`${collectionKey}-${today()}.csv`}
      getSearchText={searchText ? row => searchText(row, data) : null}
      renderActions={row => <div className="flex gap-2"><button className="btn btn-outline !py-1.5" onClick={() => edit(row)}>Edit</button><button className="btn btn-danger !py-1.5" onClick={() => remove(row)}>Delete</button></div>}
    />
    <Modal open={open} title={form.id ? `Edit ${title}` : `Add ${title}`} onClose={() => setOpen(false)}>
      <form onSubmit={save} className="space-y-4">
        <div className="grid md:grid-cols-2 gap-4">
          {fields.map(field => <Field key={field.name} label={field.label}><div className={field.full ? 'md:col-span-2' : ''}>{renderFormControl(field, form, setForm, data)}</div></Field>)}
        </div>
        <div className="flex justify-end gap-2"><button type="button" className="btn btn-secondary" onClick={() => setOpen(false)}>Cancel</button><button className="btn btn-primary">Save</button></div>
      </form>
    </Modal>
  </div>;
}

function PrayerRequestsManagement({ filterFn=null, initialPatch={} }) {
  const { data, updateCollection, notify } = React.useContext(DataContext);
  const emptyRecord = { member_id: '', requester_name: '', request_type: 'Prayer', privacy_level: 'Prayer Team', priority: 'Normal', status: 'Open', assigned_minister_id: '', request_text: '', private_notes: '', requested_at: nowIso(), prayed_at: '', answered_at: '', closed_at: '' };

  const rows = React.useMemo(() => {
    const prayerRows = safeArray(data.careRequests).filter(row => (row.request_type || 'Prayer') === 'Prayer');
    return filterFn ? prayerRows.filter(row => filterFn(row, data)) : prayerRows;
  }, [data, filterFn]);
  const edit = row => { setForm({ ...emptyRecord, ...row }); setOpen(true); };

    if (!window.confirm('Delete prayer request?')) return;
    await updateCollection('careRequests', items => safeArray(items).filter(item => item.id !== row.id), { successMessage: 'Prayer request deleted successfully.' });
  };
  const save = async event => {
    event.preventDefault();
    if (!form.request_text.trim()) { notify('error', 'Prayer request is required.'); return; }
    const payload = {
      ...emptyRecord,
      ...form,
      ...initialPatch,
      id: form.id || uid(),
      request_type: 'Prayer',
      requested_at: form.requested_at || nowIso(),
      closed_at: form.status === 'Closed' ? (form.closed_at || nowIso()) : '',
      updated_at: nowIso()
    };
    if (!form.id) payload.created_at = nowIso();
    await updateCollection('careRequests', items => safeArray(items).some(item => item.id === payload.id) ? safeArray(items).map(item => item.id === payload.id ? payload : item) : [payload, ...safeArray(items)], { successMessage: 'Prayer request saved successfully.' });
    setOpen(false);
    setForm({ ...emptyRecord, ...initialPatch });
  };
  const updatePrayer = async (row, patch) => {
    await updateCollection('careRequests', items => safeArray(items).map(item => item.id === row.id ? { ...item, ...patch, updated_at: nowIso() } : item), { successMessage: 'Prayer request updated successfully.' });
  };

    { key: 'requester', label: 'Name', render: r => prayerRequesterName(data, r) },
    { key: 'privacy_level', label: 'Privacy', render: r => r.privacy_level || 'Prayer Team' },

    { key: 'assigned_minister_id', label: 'Assigned Minister', render: r => ministerName(data, r.assigned_minister_id) },
    { key: 'requested_at', label: 'Submitted', render: r => r.requested_at ? new Date(r.requested_at).toLocaleDateString() : '' },
    { key: 'request_text', label: 'Request' }
  ];
  return <div className="space-y-4">
    <SectionHeader title="Prayer Requests" actions={<button className="btn btn-primary" onClick={() => { setForm({ ...emptyRecord, ...initialPatch }); setOpen(true); }}><i className="fas fa-plus"></i>Add Prayer Request</button>} />
    <Table columns={columns} rows={rows} renderActions={row => <div className="flex flex-wrap gap-2">
      {!row.prayed_at && <button className="btn btn-outline !py-1.5" onClick={() => updatePrayer(row, { prayed_at: nowIso(), status: row.status === 'Open' ? 'In Progress' : row.status })}>Prayed</button>}
      {!row.answered_at && <button className="btn btn-outline !py-1.5" onClick={() => updatePrayer(row, { prayed_at: row.prayed_at || nowIso(), answered_at: nowIso(), status: 'Closed', closed_at: nowIso() })}>Answered</button>}
      <button className="btn btn-outline !py-1.5" onClick={() => edit(row)}>Edit</button>
      <button className="btn btn-danger !py-1.5" onClick={() => remove(row)}>Delete</button>
    </div>} />
    <Modal open={open} title={form.id ? 'Edit Prayer Request' : 'Add Prayer Request'} onClose={() => setOpen(false)}>
      <form onSubmit={save} className="space-y-4">
        <div className="grid md:grid-cols-2 gap-4">
          <Field label="Member"><select className="select" value={form.member_id || ''} onChange={e => setForm({ ...form, member_id: e.target.value })}><option value="">Select</option>{optionRows(data.members, 'full_name').map(opt => <option key={opt.value} value={opt.value}>{opt.label}</option>)}</select></Field>
          <Field label="Name"><input className="input" value={form.requester_name || ''} onChange={e => setForm({ ...form, requester_name: e.target.value })} /></Field>
          <Field label="Privacy"><select className="select" value={form.privacy_level || 'Prayer Team'} onChange={e => setForm({ ...form, privacy_level: e.target.value })}>{PRAYER_PRIVACY_OPTIONS.map(x => <option key={x}>{x}</option>)}</select></Field>
          <Field label="Priority"><select className="select" value={form.priority || 'Normal'} onChange={e => setForm({ ...form, priority: e.target.value })}>{PRIORITIES.map(x => <option key={x}>{x}</option>)}</select></Field>
          <Field label="Status"><select className="select" value={form.status || 'Open'} onChange={e => setForm({ ...form, status: e.target.value })}>{REQUEST_STATUSES.map(x => <option key={x}>{x}</option>)}</select></Field>
          <Field label="Assigned Minister"><select className="select" value={form.assigned_minister_id || ''} onChange={e => setForm({ ...form, assigned_minister_id: e.target.value })}><option value="">Select</option>{optionRows(data.ministers, 'full_name').map(opt => <option key={opt.value} value={opt.value}>{opt.label}</option>)}</select></Field>
          <div className="md:col-span-2"><Field label="Request"><textarea className="textarea" required value={form.request_text || ''} onChange={e => setForm({ ...form, request_text: e.target.value })}></textarea></Field></div>
          <div className="md:col-span-2"><Field label="Private Notes"><textarea className="textarea" value={form.private_notes || ''} onChange={e => setForm({ ...form, private_notes: e.target.value })}></textarea></Field></div>
        </div>
        <div className="flex justify-end gap-2"><button type="button" className="btn btn-secondary" onClick={() => setOpen(false)}>Cancel</button><button className="btn btn-primary">Save</button></div>
      </form>
    </Modal>
  </div>;
}

function FinanceSummary() {

function nextAnnualDate(value) {
  if (!value) return '';
  const [, month, day] = String(value).split('-');
  if (!month || !day) return '';
  const now = new Date();
  let next = new Date(now.getFullYear(), Number(month) - 1, Number(day));
  if (next < new Date(now.getFullYear(), now.getMonth(), now.getDate())) next = new Date(now.getFullYear() + 1, Number(month) - 1, Number(day));
  return next.toISOString().slice(0, 10);
}
function daysUntil(dateValue) {
  if (!dateValue) return 9999;
  const start = new Date(`${today()}T00:00:00`);
  const end = new Date(`${dateValue}T00:00:00`);
  return Math.round((end - start) / 86400000);
}

  const membershipRows = data.members

    .map(member => ({ id: `mem-${member.id}`, title: `${member.full_name} Membership Anniversary`, reminder_type: 'Membership Anniversary', reminder_date: nextAnnualDate(member.joined_date), assigned_to: '', status: 'Pending', notes: member.member_number || '' }));
  const followUpRows = data.pastoralVisits
    .filter(row => row.next_follow_up_date && row.status !== 'Cancelled')
    .map(row => ({ id: `visit-${row.id}`, title: `${memberName(data, row.member_id)} Follow-up`, reminder_type: 'Pastoral Follow-up', reminder_date: row.next_follow_up_date, assigned_to: ministerName(data, row.minister_id), status: row.status === 'Completed' ? 'Pending' : row.status, notes: row.summary || '' }));
  return [...birthdayRows, ...membershipRows, ...followUpRows]

    .sort((a, b) => daysUntil(a.reminder_date) - daysUntil(b.reminder_date));

function dateInRange(value='', start='', end='') {

  return true;
}

}

function writeZipHeader(signature, fields, nameBytes, extraBytes=new Uint8Array(0)) {
  const fieldBytes = safeArray(fields).reduce((sum, field) => sum + (field.bits === 32 ? 4 : 2), 0);
  const size = 4 + fieldBytes + nameBytes.length + extraBytes.length;
  const bytes = new Uint8Array(size);
  const view = new DataView(bytes.buffer);
  view.setUint32(0, signature, true);
  let offset = 4;
  fields.forEach(field => {
    if (field.bits === 32) {
      view.setUint32(offset, field.value >>> 0, true);
      offset += 4;
    } else {
      view.setUint16(offset, field.value & 0xffff, true);
      offset += 2;
    }
  });
  bytes.set(nameBytes, offset);
  offset += nameBytes.length;
  bytes.set(extraBytes, offset);
  return bytes;
}
async function createZipBlob(files=[]) {
  const encoder = new TextEncoder();
  const date = dosDateTime();
  const chunks = [];
  const central = [];
  let offset = 0;
  for (const file of files) {
    const nameBytes = encoder.encode(file.name);
    let dataBytes;
    if (file.data instanceof Blob) dataBytes = await blobToBytes(file.data);
    else if (file.data instanceof Uint8Array) dataBytes = file.data;
    else dataBytes = encoder.encode(String(file.data ?? ''));
    const crc = crc32(dataBytes);
    const local = writeZipHeader(0x04034b50, [
      { value: 20 }, { value: 2048 }, { value: 0 }, { value: date.time }, { value: date.day },
      { value: crc, bits: 32 }, { value: dataBytes.length, bits: 32 }, { value: dataBytes.length, bits: 32 },
      { value: nameBytes.length }, { value: 0 }
    ], nameBytes);
    chunks.push(local, dataBytes);
    const centralHeader = writeZipHeader(0x02014b50, [
      { value: 20 }, { value: 20 }, { value: 2048 }, { value: 0 }, { value: date.time }, { value: date.day },
      { value: crc, bits: 32 }, { value: dataBytes.length, bits: 32 }, { value: dataBytes.length, bits: 32 },
      { value: nameBytes.length }, { value: 0 }, { value: 0 }, { value: 0 }, { value: 0 },
      { value: 0, bits: 32 }, { value: offset, bits: 32 }
    ], nameBytes);
    central.push(centralHeader);
    offset += local.length + dataBytes.length;
  }
  const centralSize = central.reduce((sum, item) => sum + item.length, 0);
  const centralOffset = offset;
  const end = new Uint8Array(22);
  const view = new DataView(end.buffer);
  view.setUint32(0, 0x06054b50, true);
  view.setUint16(4, 0, true);
  view.setUint16(6, 0, true);
  view.setUint16(8, files.length, true);
  view.setUint16(10, files.length, true);
  view.setUint32(12, centralSize, true);
  view.setUint32(16, centralOffset, true);
  view.setUint16(20, 0, true);
  return new Blob([...chunks, ...central, end], { type: 'application/zip' });
}
function downloadBlob(blob, filename='download.zip') {
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = filename;
  document.body.appendChild(link);
  link.click();
  link.remove();
  setTimeout(() => URL.revokeObjectURL(url), 2000);
}
function validateChurchPackagePayload(settings={}, options={}) {
  const churchName = String(settings.church_name || '').trim();
  const logoUrl = String(settings.logo_url || '').trim();
  const supabaseUrl = String(options.supabase_url || '').trim();
  const supabaseKey = String(options.supabase_anon_key || '').trim();
  if (!churchName) throw new Error('Enter the new church name.');
  if (!logoUrl) throw new Error('Select the new church logo.');
  if (!supabaseUrl) throw new Error('Enter the new church Supabase Project URL.');
  if (!supabaseKey) throw new Error('Enter the new church Supabase Anon Key.');
}
async function buildChurchFrontendPackageFiles(settings={}, options={}) {
  validateChurchPackagePayload(settings, options);
  const logoSource = String(settings.logo_url || '').trim();
  const img = await loadDeploymentImage(logoSource);
  const files = [];
  const iconBlobs = new Map();
  for (const size of DEPLOYMENT_ICON_SIZES) {
    const blob = await buildIconBlob(img, size, false);
    iconBlobs.set(size, blob);
    files.push({ name: `church-app-icon-${size}.png`, data: blob });
  }
  files.push({ name: 'church-icon-192.png', data: iconBlobs.get(192) });
  files.push({ name: 'church-icon-512.png', data: iconBlobs.get(512) });
  const maskable = await buildIconBlob(img, 512, true);
  files.push({ name: 'church-app-icon-maskable-512.png', data: maskable });
  files.push({ name: 'favicon.ico', data: await buildFaviconBlob(iconBlobs.get(48)) });
  files.push({ name: 'church-share-preview.png', data: await buildSharePreviewBlob(img, settings) });
  files.push({ name: 'manifest.webmanifest', data: buildDeploymentManifest(settings, options) });
  files.push({ name: 'sw.js', data: buildDeploymentServiceWorker(settings) });
  files.push({ name: 'index.html', data: buildDeployableIndexHtml(settings, options) });
  files.push({ name: 'church_settings_seed_update.sql', data: buildChurchSettingsSeedSql(settings) });
  files.push({ name: 'PACKAGE_NOTES.txt', data: buildPackageNotes(settings) });
  return files;
}
async function downloadChurchFrontendZip(settings={}, options={}) {
  const files = await buildChurchFrontendPackageFiles(settings, options);
  const zip = await createZipBlob(files);
  downloadBlob(zip, `${deploymentSlug(settings.church_name || 'church')}-github-pages-package.zip`);
}
async function saveChurchFrontendOutputFolder(settings={}, options={}) {
  const files = await buildChurchFrontendPackageFiles(settings, options);
  if (!window.showDirectoryPicker) {
    const zip = await createZipBlob(files);
    downloadBlob(zip, `${deploymentSlug(settings.church_name || 'church')}-github-pages-package.zip`);
    return 'zip';
  }
  const rootDir = await window.showDirectoryPicker({ mode: 'readwrite' });
  const folder = await rootDir.getDirectoryHandle(`${deploymentSlug(settings.church_name || 'church')}-github-pages-package`, { create: true });
  for (const file of files) {
    const handle = await folder.getFileHandle(file.name, { create: true });
    const writable = await handle.createWritable();
    await writable.write(file.data);
    await writable.close();
  }
  return 'folder';
}

function NewChurchGitHubPackageManager() {
  const { data, notify } = React.useContext(DataContext);
  const buildDefaultPackageForm = React.useCallback(() => {
    const saved = readSavedChurchPackageForm();
    const base = { church_name: '', address: '', contact: '', location: '', logo_url: '', app_short_name: '', supabase_url: '', supabase_anon_key: '' };
    return saved ? { ...base, ...normalizeChurchPackageFormPayload(saved) } : base;
  }, []);
  const [packageForm, setPackageForm] = React.useState(buildDefaultPackageForm);
  const [packageSaved, setPackageSaved] = React.useState(Boolean(readSavedChurchPackageForm()));
  const updatePackageField = (key, value) => setPackageForm(current => {
    const next = { ...current, [key]: value };
    if (key === 'church_name' && !current.app_short_name) next.app_short_name = shortAppName(value);
    setPackageSaved(false);
    return next;
  });
  const resetPackageForm = () => {
    setPackageForm({ church_name: '', address: '', contact: '', location: '', logo_url: '', app_short_name: '', supabase_url: '', supabase_anon_key: '' });
    safeStorageSet(CHURCH_PACKAGE_STORAGE_KEY, '');
    setPackageSaved(false);
    notify('info', 'New church package fields reset.');
  };
  const validatePackageFormInputs = (sourceForm=packageForm) => {
    const normalized = normalizeChurchPackageFormPayload(sourceForm);
    if (!normalized.church_name) throw new Error('Enter the new church name.');
    if (!normalized.logo_url) throw new Error('Select the new church logo.');
    if (!normalized.supabase_url) throw new Error('Enter the new church Supabase project URL.');
    if (!normalized.supabase_anon_key) throw new Error('Enter the new church Supabase anon key.');
    return normalized;
  };
  const savePackageDetails = ({ quiet=false } = {}) => {
    const normalized = validatePackageFormInputs(packageForm);
    const saved = saveChurchPackageFormPayload(normalized);
    setPackageForm(saved);
    setPackageSaved(true);
    if (!quiet) notify('success', 'New church package details saved.');
    return saved;
  };
  const buildPackageSettingsPayload = (sourceForm=packageForm) => {
    const normalized = normalizeChurchPackageFormPayload(sourceForm);
    const savedCurrentChurchSettings = data.churchSettings || defaultChurch;
    const savedSignatureScale = Math.min(220, Math.max(70, Number(savedCurrentChurchSettings.general_overseer_signature_scale || 135)));
    return ensureDailyVerseSettings({
      ...savedCurrentChurchSettings,
      church_name: normalized.church_name,
      address: normalized.address,
      contact: normalized.contact,
      location: normalized.location,
      logo_url: normalized.logo_url,
      general_overseer_signature_scale: savedSignatureScale
    });
  };
  const buildPackageOptionsPayload = (sourceForm=packageForm) => {
    const normalized = normalizeChurchPackageFormPayload(sourceForm);
    return {
      app_short_name: normalized.app_short_name,
      supabase_url: normalized.supabase_url,
      supabase_anon_key: normalized.supabase_anon_key
    };
  };
  const validatePackagePayload = (sourceForm=packageForm) => {
    const normalized = validatePackageFormInputs(sourceForm);
    const payload = buildPackageSettingsPayload(normalized);
    const options = buildPackageOptionsPayload(normalized);
    if (!options.supabase_url || options.supabase_url === SUPABASE_URL) throw new Error('Enter and save the new church Supabase project URL.');
    if (!options.supabase_anon_key || options.supabase_anon_key === SUPABASE_ANON_KEY) throw new Error('Enter and save the new church Supabase anon key.');
    return { payload, options };
  };
  const generateZipPackage = async () => {
    try {
      const saved = savePackageDetails({ quiet: true });
      const { payload, options } = validatePackagePayload(saved);
      await downloadChurchFrontendZip(payload, options);
      notify('success', 'New church GitHub package generated.');
    } catch (error) {
      notify('error', error?.message || 'Package generation failed.');
    }
  };
  const exportOutputFolder = async () => {
    try {
      const saved = savePackageDetails({ quiet: true });
      const { payload, options } = validatePackagePayload(saved);
      const result = await saveChurchFrontendOutputFolder(payload, options);
      notify('success', result === 'folder' ? 'New church output folder created.' : 'New church GitHub package generated.');
    } catch (error) {
      if (error?.name === 'AbortError') return;
      notify('error', error?.message || 'Package export failed.');
    }
  };
  return <div className="space-y-4">
    <SectionHeader title="New Church GitHub Package" />
    <div className="card p-5 space-y-4">
      <div className="flex items-center gap-3">
        <span className="icon-modern icon-indigo"><i className="fas fa-box-open"></i></span>
        <div>
          <h3 className="font-extrabold text-slate-900">New Church GitHub Package</h3>
          {packageSaved && <div className="text-xs font-bold text-emerald-700 mt-1"><i className="fas fa-check-circle mr-1"></i>Package details saved</div>}
        </div>
      </div>
      <div className="grid md:grid-cols-2 gap-4">
        <Field label="New Church Name"><input className="input" value={packageForm.church_name || ''} onChange={e => updatePackageField('church_name', e.target.value)} /></Field>
        <Field label="New Church Logo"><LocalImageUploadInput value={packageForm.logo_url || ''} onChange={logo_url => updatePackageField('logo_url', logo_url)} /></Field>
        <Field label="New Church Address"><input className="input" value={packageForm.address || ''} onChange={e => updatePackageField('address', e.target.value)} /></Field>
        <Field label="New Church Contact"><input className="input" value={packageForm.contact || ''} onChange={e => updatePackageField('contact', e.target.value)} /></Field>
        <Field label="New Church Location"><input className="input" value={packageForm.location || ''} onChange={e => updatePackageField('location', e.target.value)} /></Field>
        <Field label="App Short Name"><input className="input" value={packageForm.app_short_name || ''} onChange={e => updatePackageField('app_short_name', e.target.value)} /></Field>
        <Field label="Supabase Project URL"><input className="input" value={packageForm.supabase_url || ''} onChange={e => updatePackageField('supabase_url', e.target.value)} /></Field>
        <Field label="Supabase Anon Key"><input className="input" value={packageForm.supabase_anon_key || ''} onChange={e => updatePackageField('supabase_anon_key', e.target.value)} /></Field>
      </div>
      <div className="flex flex-wrap justify-end gap-2">
        <button type="button" className="btn btn-secondary" onClick={resetPackageForm}><i className="fas fa-rotate-left"></i>Reset</button>
        <button type="button" className="btn btn-outline" onClick={() => { try { savePackageDetails(); } catch (error) { notify('error', error?.message || 'Package details could not be saved.'); } }}><i className="fas fa-save"></i>Save Package Details</button>
        <button type="button" className="btn btn-outline" onClick={generateZipPackage}><i className="fas fa-file-zipper"></i>Download GitHub ZIP</button>
        <button type="button" className="btn btn-primary" onClick={exportOutputFolder}><i className="fas fa-folder-plus"></i>Create Output Folder</button>
      </div>
    </div>
  </div>;
}
function ChatManagement({ role, linkedId }) {
  const { data, updateCollection } = React.useContext(DataContext);
  const [receiver, setReceiver] = React.useState('');
  const [contactSearch, setContactSearch] = React.useState('');
  const [message, setMessage] = React.useState('');
  const [actionMessageId, setActionMessageId] = React.useState('');
  const [editingMessageId, setEditingMessageId] = React.useState('');
  const [editingText, setEditingText] = React.useState('');
  const holdTimerRef = React.useRef(null);
  const isOwnMessage = React.useCallback(msg => msg.sender_role === role && (role === 'admin' ? !msg.sender_id : msg.sender_id === linkedId), [role, linkedId]);
  const clearHoldTimer = React.useCallback(() => {
    if (holdTimerRef.current) window.clearTimeout(holdTimerRef.current);
    holdTimerRef.current = null;
  }, []);
  const startHold = React.useCallback(msg => {
    if (!isOwnMessage(msg)) return;
    clearHoldTimer();
    holdTimerRef.current = window.setTimeout(() => setActionMessageId(msg.id), 520);
  }, [clearHoldTimer, isOwnMessage]);
  React.useEffect(() => clearHoldTimer, [clearHoldTimer]);
  const contacts = React.useMemo(() => {
    const term = contactSearch.trim().toLowerCase();
    const matches = contact => !term || compactText([contact.label, contact.role]).toLowerCase().includes(term);
    const contactValue = contact => `${contact.role}|${contact.id || ''}`;
    let list = [];
    const staffContacts = [
      ...safeArray(data.ministers).map(x => ({ role: x.title?.toLowerCase().includes('senior') ? 'senior_pastor' : 'pastor', id: x.id, label: `${x.full_name} (${x.title})` })),
      ...safeArray(data.financeOfficers).map(x => ({ role: 'finance_officer', id: x.id, label: `${x.full_name} (Finance)` }))
    ].filter(matches);
    if (role !== 'member') {
      const members = safeArray(data.members)
        .map(x => ({ role: 'member', id: x.id, label: `${x.full_name} (Member)` }))
        .filter(matches)
        .slice(0, CONTACT_RESULT_LIMIT);
      list = [...staffContacts, ...members];
    } else {
      const members = safeArray(data.members)
        .filter(x => x.id !== linkedId)
        .map(x => ({ role: 'member', id: x.id, label: `${x.full_name} (Member)` }))
        .filter(matches)
        .slice(0, 30);
      list = [...staffContacts, ...members];
    }
    list = list.filter(x => !(x.role === role && x.id === linkedId));
    if (receiver && !list.some(contact => contactValue(contact) === receiver)) {
      const [selectedRole, selectedId] = receiver.split('|');
      const selected = [
        ...safeArray(data.ministers).map(x => ({ role: x.title?.toLowerCase().includes('senior') ? 'senior_pastor' : 'pastor', id: x.id, label: `${x.full_name} (${x.title})` })),
        ...safeArray(data.financeOfficers).map(x => ({ role: 'finance_officer', id: x.id, label: `${x.full_name} (Finance)` })),
        ...safeArray(data.members).map(x => ({ role: 'member', id: x.id, label: `${x.full_name} (Member)` }))
      ].find(contact => contact.role === selectedRole && String(contact.id || '') === selectedId);
      if (selected) list = [selected, ...list];
    }
    return list;
  }, [data.ministers, data.financeOfficers, data.members, role, linkedId, receiver, contactSearch]);
  const messages = React.useMemo(() => data.chats.filter(msg => {
    const mineSender = msg.sender_role === role && (role === 'admin' ? !msg.sender_id : msg.sender_id === linkedId);
    const mineReceiver = msg.receiver_role === role && (role === 'admin' ? !msg.receiver_id : msg.receiver_id === linkedId);
    if (!mineSender && !mineReceiver) return false;
    if (mineSender && msg.deleted_by_sender) return false;
    if (mineReceiver && msg.deleted_by_receiver) return false;
    if (!receiver) return true;
    const [rRole, rId] = receiver.split('|');
    return (mineSender && msg.receiver_role === rRole && String(msg.receiver_id || '') === rId) || (mineReceiver && msg.sender_role === rRole && String(msg.sender_id || '') === rId);
  }).sort((a,b) => new Date(a.created_at) - new Date(b.created_at)), [data.chats, role, linkedId, receiver]);
  const send = async e => {
    e.preventDefault();
    if (!receiver || !message.trim()) return;
    const [receiver_role, receiver_id] = receiver.split('|');
    const payload = { id: uid(), sender_role: role, sender_id: role === 'admin' ? null : linkedId, receiver_role, receiver_id: receiver_id || null, message: message.trim(), is_read: false, deleted_by_sender: false, deleted_by_receiver: false, flagged: false, created_at: nowIso() };
    await updateCollection('chats', rows => [...safeArray(rows), payload], { silentSuccess: true, suppressBusy: true });
    setMessage('');
  };
  const beginEdit = msg => {
    if (!isOwnMessage(msg)) return;
    setEditingMessageId(msg.id);
    setEditingText(msg.message || '');
    setActionMessageId('');
  };
  const cancelEdit = () => {
    setEditingMessageId('');
    setEditingText('');
  };
  const saveEdit = async e => {
    e.preventDefault();
    const text = editingText.trim();
    if (!editingMessageId || !text) return;
    await updateCollection('chats', rows => safeArray(rows).map(row => row.id === editingMessageId ? { ...row, message: text } : row), { silentSuccess: true, suppressBusy: true, offlineMessage: 'Message edited here. Sync is pending.' });
    cancelEdit();
  };
  const deleteMessage = async msg => {
    if (!isOwnMessage(msg)) return;
    if (!window.confirm('Delete this sent message?')) return;
    await updateCollection('chats', rows => safeArray(rows).filter(row => row.id !== msg.id), { silentSuccess: true, suppressBusy: true, offlineMessage: 'Message deleted here. Sync is pending.' });
    setActionMessageId('');
    if (editingMessageId === msg.id) cancelEdit();
  };
  return <div className="space-y-4">
    <SectionHeader title="Church Chat" />
    <div className="grid lg:grid-cols-[320px,1fr] gap-4">
      <div className="card p-4 space-y-3">
        <Field label="Find Contact"><input className="input" value={contactSearch} onChange={e => setContactSearch(e.target.value)} placeholder="Search contacts" /></Field>
        <Field label="Recipient"><select className="select" value={receiver} onChange={e => setReceiver(e.target.value)}><option value="">All conversations</option>{contacts.map(c => <option key={`${c.role}|${c.id}`} value={`${c.role}|${c.id}`}>{c.label}</option>)}</select></Field>
        <form onSubmit={send} className="space-y-3"><textarea className="textarea" value={message} onChange={e => setMessage(e.target.value)} placeholder="Write message..."></textarea><button className="btn btn-primary w-full"><i className="fas fa-paper-plane"></i>Send</button></form>
      </div>
      <div className="space-y-3">
        {messages.length ? messages.map(msg => {
          const isMine = isOwnMessage(msg);

        }) : <EmptyState text="No chat messages yet." />}
      </div>
    </div>
  </div>;
}

function buildImportPreview(data, collectionKey, text) {
  const objects = csvToObjects(text);
  const existing = new Set();
  const incoming = new Set();
  const result = [];
  const addIssue = (issues, condition, message) => { if (condition) issues.push(message); };
  for (const row of objects) {
    const issues = [];
    let payload = null;
    if (collectionKey === 'members') {
      const prefix = generatedPrefix(data.churchSettings.church_name, 'MEM');
      const memberNumber = pickImportValue(row, ['member_number', 'member no', 'member']) || `${prefix}${String(nextSequence([...data.members, ...result.map(item => item.payload).filter(Boolean)], 'member_number', 1)).padStart(5, '0')}`;
      payload = { id: uid(), member_number: memberNumber, full_name: pickImportValue(row, ['full_name', 'name']), gender: pickImportValue(row, ['gender']) || 'Male', dob: pickImportValue(row, ['dob', 'date_of_birth']), phone: pickImportValue(row, ['phone', 'telephone']), email: normalizeEmailValue(pickImportValue(row, ['email'])), address: pickImportValue(row, ['address']), household_id: '', primary_ministry_id: '', marital_status: pickImportValue(row, ['marital_status']) || 'Single', membership_status: pickImportValue(row, ['membership_status', 'status']) || 'Active', joined_date: pickImportValue(row, ['joined_date']) || today(), baptism_date: pickImportValue(row, ['baptism_date']), photo_url: '', account_active: true, created_at: nowIso(), updated_at: nowIso() };
      addIssue(issues, !payload.full_name, 'Full name required');
      for (const [field, label] of [['member_number', 'Member number'], ['phone', 'Phone'], ['email', 'Email']]) {
        const value = field === 'phone' ? normalizePhoneValue(payload[field]) : field === 'email' ? normalizeEmailValue(payload[field]) : normalizeComparable(payload[field]);
        if (!value) continue;
        const key = `${field}:${value}`;
        addIssue(issues, incoming.has(key), `${label} duplicated in file`);
        incoming.add(key);
        addIssue(issues, safeArray(data.members).some(item => (field === 'phone' ? normalizePhoneValue(item[field]) : field === 'email' ? normalizeEmailValue(item[field]) : normalizeComparable(item[field])) === value), `${label} already exists`);
      }
    } else if (collectionKey === 'households') {
      payload = { id: uid(), family_name: pickImportValue(row, ['family_name', 'family', 'name']), primary_phone: pickImportValue(row, ['primary_phone', 'phone']), address: pickImportValue(row, ['address']), home_area: pickImportValue(row, ['home_area', 'area']), notes: pickImportValue(row, ['notes']), created_at: nowIso(), updated_at: nowIso() };
      addIssue(issues, !payload.family_name, 'Family name required');
      const key = normalizeComparable(payload.family_name);
      addIssue(issues, key && existing.has(key), 'Family duplicated in file');
      if (key) existing.add(key);
      addIssue(issues, key && data.households.some(item => normalizeComparable(item.family_name) === key), 'Family already exists');
    } else if (collectionKey === 'ministries') {
      payload = { id: uid(), name: pickImportValue(row, ['name', 'ministry_name', 'ministry']), category: pickImportValue(row, ['category']), leader_member_id: '', leader_minister_id: '', meeting_day: pickImportValue(row, ['meeting_day']), description: pickImportValue(row, ['description']), active: true, created_at: nowIso(), updated_at: nowIso() };
      addIssue(issues, !payload.name, 'Ministry name required');
      const key = normalizeComparable(payload.name);
      addIssue(issues, key && existing.has(key), 'Ministry duplicated in file');
      if (key) existing.add(key);
      addIssue(issues, key && data.ministries.some(item => normalizeComparable(item.name) === key), 'Ministry already exists');
    } else if (collectionKey === 'giving') {
      const member = findImportMember(data, pickImportValue(row, ['member_number', 'member', 'member_id', 'name']));
      const fund = findImportFund(data, pickImportValue(row, ['fund', 'fund_id']));
      const amount = Number(pickImportValue(row, ['amount']));
      const reference = pickImportValue(row, ['reference', 'receipt_no', 'receipt']);
      payload = { id: uid(), member_id: member?.id || '', fund_id: fund?.id || '', giving_date: pickImportValue(row, ['giving_date', 'date']) || today(), amount, payment_method: pickImportValue(row, ['payment_method', 'method']) || 'Cash', reference, recorded_by_finance_id: '', notes: pickImportValue(row, ['notes']), created_at: nowIso(), updated_at: nowIso() };
      addIssue(issues, !payload.fund_id, 'Fund required');
      addIssue(issues, !Number.isFinite(amount) || amount < 0, 'Valid amount required');
      if (reference) addIssue(issues, data.giving.some(item => normalizeComparable(item.reference) === normalizeComparable(reference)), 'Reference already exists');
    } else if (collectionKey === 'attendance') {
      const member = findImportMember(data, pickImportValue(row, ['member_number', 'member', 'member_id', 'name']));
      const service = findImportService(data, pickImportValue(row, ['service', 'service_id', 'service_name']), pickImportValue(row, ['service_date', 'date']));
      payload = { id: uid(), service_id: service?.id || '', member_id: member?.id || '', status: pickImportValue(row, ['status']) || 'Present', checked_in_at: pickImportValue(row, ['checked_in_at']) || nowIso(), recorded_by: '', notes: pickImportValue(row, ['notes']), created_at: nowIso(), updated_at: nowIso() };
      addIssue(issues, !payload.service_id, 'Service required');
      addIssue(issues, !payload.member_id, 'Member required');
      addIssue(issues, payload.service_id && payload.member_id && data.attendance.some(item => item.service_id === payload.service_id && item.member_id === payload.member_id), 'Attendance already exists');
    }
    result.push({ row_number: row.__rowNumber, status: issues.length ? 'Invalid' : 'Ready', issues: issues.join(', '), payload, name: payload?.full_name || payload?.family_name || payload?.name || payload?.purpose || payload?.reference || payload?.member_number || '' });
  }
  return result;
}

function AppShell() {
  const store = React.useContext(DataContext);
  const [session, setSession] = React.useState({ role: null, linkedId: null, credentialId: null, username: '' });
  const [activeNav, setActiveNav] = React.useState('dashboard');
  const [mobileNavOpen, setMobileNavOpen] = React.useState(false);
  const [forcePasswordModal, setForcePasswordModal] = React.useState(false);
  React.useEffect(() => {
    if (!store.loaded) return;
    try {
      localStorage.removeItem(SESSION_KEY);
      const saved = JSON.parse(sessionStorage.getItem(SESSION_KEY) || 'null');
      if (!saved?.role || !saved?.sessionToken) return;
      if (saved.sessionExpiresAt && new Date(saved.sessionExpiresAt).getTime() <= Date.now()) {
        sessionStorage.removeItem(SESSION_KEY);
        setSupabaseSessionToken('');
        setActiveSessionRole('');
        return;
      }
      setSupabaseSessionToken(saved.sessionToken);
      setActiveSessionRole(saved.role);
      setSession(saved);
      store.reloadData({ silent: true }).then(ok => {
        if (!ok) {
          setSupabaseSessionToken('');
          setActiveSessionRole('');
          sessionStorage.removeItem(SESSION_KEY);
          setSession({ role: null, linkedId: null, credentialId: null, username: '' });
          return;
        }
        store.setPresenceStatus(saved.role, saved.linkedId, true).catch(() => {});
      }).catch(() => {});
    } catch (e) {}
  }, [store.loaded]);
  React.useEffect(() => {
    if (!session.role) return;
    let cancelled = false;
    const markOnline = () => {
      if (!cancelled) store.setPresenceStatus(session.role, session.linkedId, true).catch(() => {});
    };
    markOnline();
    const timer = window.setInterval(markOnline, 60000);
    return () => {
      cancelled = true;
      window.clearInterval(timer);
    };
  }, [session.role, session.linkedId, store.setPresenceStatus]);
  const loginWithCredentials = async (username, password) => {
    const lower = String(username || '').trim().toLowerCase();
    const client = publicSupabaseClient || supabaseClient;
    if (!client) throw new Error('Supabase is not configured.');
    const { data: result, error } = await client.rpc('church_login', { p_username: lower, p_password: String(password || '') });
    if (error) throw new Error(store.data.churchSettings.failed_login_greeting_message || 'Login failed.');
    const credential = Array.isArray(result) ? result[0] : result;
    if (!credential?.session_token) throw new Error(store.data.churchSettings.failed_login_greeting_message || 'Login failed.');
    setSupabaseSessionToken(credential.session_token);
    setActiveSessionRole(credential.role);
    const next = {
      role: credential.role,
      linkedId: credential.linked_entity_id || null,
      credentialId: credential.id,
      username: credential.username,
      sessionToken: credential.session_token,
      sessionExpiresAt: credential.expires_at || ''
    };
    setSession(next);
    setActiveNav('dashboard');
    sessionStorage.setItem(SESSION_KEY, JSON.stringify(next));
    const loaded = await store.reloadData({ silent: true });
    if (!loaded) {
      setSupabaseSessionToken('');
      setActiveSessionRole('');
      sessionStorage.removeItem(SESSION_KEY);
      setSession({ role: null, linkedId: null, credentialId: null, username: '' });
      throw new Error('Secure login succeeded, but records could not load. Run the production SQL update and try again.');
    }
    await store.setPresenceStatus(credential.role, credential.linked_entity_id, true);
    store.logActivity?.({ action: 'login', area: 'Authentication', record_label: credential.username, details: { role: credential.role } });
    if (boolValue(credential.force_password_change)) setForcePasswordModal(true);
  };
  const logout = async () => {
    if (session.role) {
      store.logActivity?.({ action: 'logout', area: 'Authentication', record_label: session.username, details: { role: session.role } });
      await store.setPresenceStatus(session.role, session.linkedId, false);
    }
    try {
      if (hasActiveSessionToken() && supabaseClient) await supabaseClient.rpc('church_logout');
    } catch (error) {}
    setSupabaseSessionToken('');
    setActiveSessionRole('');
    setSession({ role: null, linkedId: null, credentialId: null, username: '' });
    setActiveNav('dashboard');
    sessionStorage.removeItem(SESSION_KEY);
    store.reloadData({ silent: true });
  };
  const changeOwnPassword = async (currentPassword, newPassword) => {
    if (!supabaseClient) throw new Error('Supabase is not configured.');
    const { error } = await supabaseClient.rpc('church_change_password', { p_current_password: currentPassword, p_new_password: newPassword });
    if (error) throw error;
    store.notify('success', 'Password changed successfully.');
    await store.reloadData({ silent: true });
    setForcePasswordModal(false);
  };
  const contextValue = { session, setSession, activeNav, setActiveNav, loginWithCredentials, logout, mobileNavOpen, setMobileNavOpen, forcePasswordModal, setForcePasswordModal, changeOwnPassword };
  if (!store.loaded) return <BusyOverlay text="Loading church management system..." />;
  return <SessionContext.Provider value={contextValue}>
    <div className="min-h-screen flex flex-col">
      <Header />
      <OfflineBanner state={store.offlineState} onSync={store.flushPendingChanges} />
      <LicenseExpiryNotice />
      <div className="flex flex-1 min-h-0">
        {session.role && <Sidebar />}
        <main className="flex-1 p-3 md:p-6 overflow-x-hidden">{!session.role ? <LoginScreen /> : <DashboardRouter />}</main>
      </div>
      <AppFooter />
      {session.role && !isWholeChurchPortalRestricted(session.role, store.data.churchSettings) && <ForcePasswordChangeModal />}
      <BusyOverlay text={store.busyText} />
      <ToastStack notifications={store.notifications} onDismiss={store.dismissNotification} />
    </div>
  </SessionContext.Provider>;
}

function ForcePasswordChangeModal() {
  const { forcePasswordModal, changeOwnPassword } = React.useContext(SessionContext);
  const { notify } = React.useContext(DataContext);
  const [currentPassword, setCurrentPassword] = React.useState('');
  const [password, setPassword] = React.useState('');
  const [confirmPassword, setConfirmPassword] = React.useState('');
  const save = async e => {
    e.preventDefault();
    if (password.length < 8) { notify('error', 'Use at least 8 characters.'); return; }
    if (password !== confirmPassword) { notify('error', 'Passwords do not match.'); return; }
    try {
      await changeOwnPassword(currentPassword, password);
      setCurrentPassword('');
      setPassword('');
      setConfirmPassword('');
    } catch (error) {
      notify('error', error?.message || 'Password change failed.');
    }
  };
  return <Modal open={forcePasswordModal} title="Change Password" onClose={() => {}}>
    <form onSubmit={save} className="space-y-4">
      <Field label="Current Password"><input className="input" type="password" value={currentPassword} onChange={e => setCurrentPassword(e.target.value)} autoComplete="current-password" required /></Field>
      <Field label="New Password"><input className="input" type="password" value={password} onChange={e => setPassword(e.target.value)} minLength="8" autoComplete="new-password" required /></Field>
      <Field label="Confirm New Password"><input className="input" type="password" value={confirmPassword} onChange={e => setConfirmPassword(e.target.value)} minLength="8" autoComplete="new-password" required /></Field>
      <div className="flex justify-end"><button className="btn btn-primary">Save Password</button></div>
    </form>
  </Modal>;

function SuperAdminChurchAdminCredentialPanel({ embedded=false }) {
  const { data, reloadData, notify } = React.useContext(DataContext);
  const adminCredential = data.credentials.find(row => row.role === 'admin') || { id: '', role: 'admin', username: 'admin', force_password_change: true, account_active: true };
  const [form, setForm] = React.useState({ username: adminCredential.username || 'admin', password: '', force_password_change: true });
  const [lastIssuedPassword, setLastIssuedPassword] = React.useState('');
  React.useEffect(() => setForm(prev => ({ ...prev, username: adminCredential.username || 'admin', force_password_change: boolValue(adminCredential.force_password_change) })), [adminCredential.username, adminCredential.force_password_change]);
  const saveAdminCredential = async (event, overridePassword='', forcePasswordOverride=null) => {
    if (event?.preventDefault) event.preventDefault();
    const username = String(form.username || '').trim().toLowerCase();
    const password = overridePassword || String(form.password || '').trim();
    if (!username) { notify('error', 'Church Admin username is required.'); return; }
    if (!adminCredential.id && password.length < 8) { notify('error', 'New Church Admin credentials need a password of at least 8 characters.'); return; }
    if (adminCredential.id && password && password.length < 8) { notify('error', 'New password must be at least 8 characters.'); return; }
    try {
      if (!supabaseClient) throw new Error('Supabase is not configured.');
      const { error } = await supabaseClient.rpc('church_admin_save_credential', {
        p_id: adminCredential.id || null,
        p_role: 'admin',
        p_linked_entity_type: null,
        p_linked_entity_id: null,
        p_username: username,
        p_password: password || null,
        p_force_password_change: forcePasswordOverride === null ? !!form.force_password_change : !!forcePasswordOverride,
        p_account_active: true
      });
      if (error) throw error;
      await reloadData({ silent: true });
      if (password) setLastIssuedPassword(password);
      setForm(current => ({ ...current, password: '' }));
      notify('success', password ? `Church Admin credentials saved. New password: ${password}` : 'Church Admin credentials saved.');
    } catch (error) {
      notify('error', error?.message || 'Unable to save Church Admin credentials.');
    }
  };
  const generateAdminCredential = () => setForm(prev => ({ ...prev, username: `churchadmin${Math.floor(Math.random() * 900 + 100)}`, password: generatePassword(), force_password_change: true }));
  const resetAdminPassword = () => {
    const nextPassword = generatePassword();
    setForm(prev => ({ ...prev, password: nextPassword, force_password_change: true }));
    saveAdminCredential(null, nextPassword, true);
  };
  return <div className="card p-5 space-y-4">
    {!embedded && <SectionHeader title="Issue Church Admin Credentials" subtitle="Only the Super Admin can issue, update, or reset the Church Admin login credentials." actions={<button type="button" onClick={generateAdminCredential} className="btn btn-outline"><i className="fas fa-wand-magic-sparkles"></i>Generate Unique Credentials</button>} />}
    {embedded && <div className="flex flex-col md:flex-row md:items-start md:justify-between gap-3"><div><h3 className="font-extrabold text-lg">Issue Church Admin Credentials</h3><p className="text-sm text-slate-500 mt-1">Create or reset the Church Admin login from Super Admin maintenance.</p></div><button type="button" onClick={generateAdminCredential} className="btn btn-outline"><i className="fas fa-wand-magic-sparkles"></i>Generate</button></div>}
    <form onSubmit={saveAdminCredential} className="grid md:grid-cols-[1fr_1fr_220px_auto] gap-4 items-end">
      <Field label="Church Admin Username"><input className="input" value={form.username} onChange={e => setForm({ ...form, username: e.target.value })} /></Field>
      <Field label="New Password"><input className="input" value={form.password} onChange={e => setForm({ ...form, password: e.target.value })} placeholder={adminCredential.id ? 'Leave blank to keep current password' : 'Required for new account'} /></Field>
      <Field label="Force Password Change"><label className="inline-flex items-center gap-2 font-semibold min-h-[42px]"><input type="checkbox" checked={!!form.force_password_change} onChange={e => setForm({ ...form, force_password_change: e.target.checked })} /> Required</label></Field>
      <button className="btn btn-primary" type="submit">Save Credentials</button>
    </form>
    <div className="flex flex-wrap gap-2"><button className="btn btn-outline" type="button" onClick={resetAdminPassword}><i className="fas fa-key"></i>Reset Church Admin Password Only</button></div>
    <div className="rounded-xl bg-slate-50 border border-slate-200 p-3 text-sm">
      <b>Current Church Admin:</b> {adminCredential.username || 'Not set'} <span className="mx-2">|</span> <b>Password:</b> {lastIssuedPassword ? <span className="font-mono">{lastIssuedPassword}</span> : 'Hidden for security. Reset to issue a new password.'} <span className="mx-2">|</span> <b>Force Password Change:</b> {boolValue(adminCredential.force_password_change) ? 'Yes' : 'No'}
    </div>
  </div>;
}
function SuperAdminAccessPanel({ embedded=false }) {

    const checkedAt = nowIso();
    await setChurchSettings(current => {
      if (locked) {
        return {
          ...current,
          admin_access_locked: true,
          platform_access_locked: true,
          church_license_status: current.church_license_code ? 'Suspended' : (current.church_license_status || defaultChurch.church_license_status),
          church_license_activated_at: current.church_license_code ? '' : current.church_license_activated_at,
          church_license_last_checked_at: checkedAt
        };
      }
      const suspended = isSuspendedLicense(current);
      return {
        ...current,
        admin_access_locked: false,
        platform_access_locked: false,
        church_license_plan: suspended ? '' : current.church_license_plan,
        church_license_label: suspended ? defaultChurch.church_license_label : current.church_license_label,
        church_license_code: suspended ? '' : current.church_license_code,
        church_license_status: suspended ? 'Not Issued' : (current.church_license_code ? 'Active' : (current.church_license_status || defaultChurch.church_license_status)),

        church_license_expires_at: suspended ? '' : current.church_license_expires_at,
        church_license_last_checked_at: checkedAt
      };
    });

  };
  return <div className="space-y-5">
